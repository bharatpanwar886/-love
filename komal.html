<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komal ke liye 💕</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0d0d1a; font-family:'Segoe UI',sans-serif; }

@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(700px) rotate(720deg);opacity:0} }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes pulse-yes { 0%,100%{box-shadow:0 0 0 0 rgba(233,30,140,0.5)} 50%{box-shadow:0 0 0 14px rgba(233,30,140,0)} }
@keyframes floatIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes wiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
@keyframes bgshift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes nameGlow { 0%,100%{text-shadow:0 0 10px rgba(255,150,200,0.5)} 50%{text-shadow:0 0 25px rgba(255,150,200,1), 0 0 40px rgba(255,100,180,0.5)} }
@keyframes starTwinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

.gw {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(270deg, #1a0533, #0d1f3c, #1a0533, #2d0a1e);
  background-size: 400% 400%;
  animation: bgshift 8s ease infinite;
}
.stars { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.star { position:absolute; background:#fff; border-radius:50%; animation: starTwinkle 2s ease-in-out infinite; }

.name-tag {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  margin-bottom: 4px;
  z-index:1;
  animation: floatIn 0.6s ease;
}
.komal-name {
  font-size: 28px;
  font-weight: 800;
  color: #ff9ece;
  letter-spacing: 1px;
  margin-bottom: 24px;
  z-index:1;
  animation: nameGlow 2s ease-in-out infinite, floatIn 0.6s ease;
}

.emoji-big { font-size: 56px; animation: heartbeat 1.2s ease-in-out infinite; margin-bottom:10px; z-index:1; position:relative; }
.qtitle {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(255,100,200,0.4);
  z-index:1; position:relative;
  transition: opacity 0.3s;
  line-height: 1.3;
}
.qsub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 28px;
  z-index:1; position:relative;
  transition: opacity 0.3s;
}

.progress-wrap {
  width: 260px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  height: 6px;
  margin: 0 auto 28px;
  overflow: hidden;
  z-index:1; position:relative;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #e91e8c, #ff6b6b);
  border-radius: 10px;
  transition: width 0.4s ease;
  width: 0%;
}

.btns-area {
  position: relative;
  width: 300px;
  height: 150px;
  margin: 0 auto;
  z-index:2;
}

.btn-yes {
  display: block;
  width: 270px;
  background: linear-gradient(135deg, #e91e8c, #ff6b6b);
  color: white;
  border: none;
  padding: 16px 40px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin: 0 auto 0;
  animation: pulse-yes 2s ease-in-out infinite;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  z-index:2;
}
.btn-yes:active { transform: translateX(-50%) scale(0.97); }

.btn-no {
  display: block;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.75);
  border: 1.5px solid rgba(255,255,255,0.2);
  padding: 13px 28px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  position: absolute;
  left: 30px;
  top: 95px;
  backdrop-filter: blur(8px);
  z-index:2;
  white-space: nowrap;
  transition: left 0.12s ease, top 0.12s ease, font-size 0.3s, opacity 0.3s;
}

.flower { position:absolute; pointer-events:none; animation: fall 3s ease-in forwards; z-index:10; }

.success {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  z-index:2;
  animation: floatIn 0.5s ease;
}
.success h2 { color:#ff6b9d; font-size:26px; font-weight:800; }
.success p { color:rgba(255,255,255,0.7); font-size:14px; }
</style>
</head>
<body>
<div class="gw" id="gw">

  <div class="stars" id="stars"></div>

  <div id="qs" style="position:relative; z-index:1; width:100%;">
    <div class="name-tag">Sirf aur sirf...</div>
    <div class="komal-name">Dr. Komal Yadav 💝</div>

    <div class="emoji-big" id="emoji">💕</div>
    <div class="qtitle" id="qt">Mujhse Kitna Pyaar Karti Ho?</div>
    <div class="qsub" id="qsub">Seedha jawab do... sach mein 👀</div>

    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

    <div class="btns-area" id="ba">
      <button class="btn-yes" id="yesBtn" onclick="yesClicked()">❤️ Bahut Zyada Karti Hoon!</button>
      <button class="btn-no" id="noBtn" onclick="noClicked()">😒 Bilkul Nahi Karti</button>
    </div>
  </div>

  <div class="success" id="ss">
    <div style="font-size:80px; animation:heartbeat 0.7s ease-in-out infinite;">💖</div>
    <h2>Yahi Sach Tha! 🎉</h2>
    <p>Dr. Komal ne maan liya! 🥰</p>
    <p>Ab main roz khana bhi banaaunga! 🍳💕</p>
    <p style="font-size:26px; margin-top:10px; animation:wiggle 1s ease-in-out infinite;">🌸🌺🌹💐🌷✨</p>
    <p style="font-size:12px; color:rgba(255,255,255,0.35); margin-top:12px;">Screenshot le lo aur bhejo! 📸😂</p>
  </div>

</div>

<script>
// Stars
var st = document.getElementById('stars');
for(var i=0;i<35;i++){
  var s=document.createElement('div');
  s.className='star';
  var sz=1+Math.random()*3;
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(0.2+Math.random()*0.6)+';animation-delay:'+Math.random()*4+'s;animation-duration:'+(1.5+Math.random()*2.5)+'s';
  st.appendChild(s);
}

var noCount = 0;
var data = [
  { e:'💕', q:'Mujhse Kitna Pyaar Karti Ho?',            s:'Seedha jawab do... sach mein 👀',          no:'😒 Bilkul Nahi Karti',     yes:'❤️ Bahut Zyada Karti Hoon!' },
  { e:'🥺', q:'Sachchi Mein? Bilkul Nahi?',               s:'Ek baar soch lo Komal ji...',               no:'😑 Haan, Nahi Karti',       yes:'💗 Thoda Bahut Karti Hoon!' },
  { e:'🍳', q:'Main Roz Tumhare Liye Khana Banaaunga...',  s:'Tab bhi nahi? Itna bhi nahi? 😭',           no:'🙄 Tab Bhi Nahi',           yes:'💕 Woh Toh Khaana Padega!' },
  { e:'😭', q:'Doctor Ho, Dil Nahi Padhti Kya?',          s:'Mera dil toot raha hai Komal! 💔',          no:'😤 Nahi Padhti',            yes:'🥰 Padhti Hoon, Pyaar Hai!' },
  { e:'🐶', q:'Itna Cute Hoon... Phir Bhi Nahi?',         s:'Button bhaag raha hai tumse 😂',            no:'😝 Nahi Ho Cute',           yes:'🥰 Haan Ho Mere Cute!' },
  { e:'🙏', q:'Ek Baar Bol Do Bas... Please Komal!',      s:'Button aur chhota ho jayega! 😂',           no:'😂 Nahi Bolugi',            yes:'✨ Bol Rahi Hoon — Haan!' },
  { e:'👉👈', q:'Dil Pe Haath Rakh Ke Socho...',          s:'Seedha answer do Doctor Sahiba!',           no:'🏃 Nahi!',                  yes:'💝 Dil Bol Raha Hai Haan!' },
  { e:'😈', q:'Ab Button Bahut Hi Chhota Ho Jayega...',   s:'Last chance hai tumhara Komal!',            no:'😅 N..Nahi',                yes:'🌹 Okay Okay — Pyaar Hai!' },
  { e:'🎯', q:'Doctor vs Dil — Kaun Jeeta?',              s:'Dil hamesha jeetta hai! 💗',                no:'...nahi',                   yes:'💞 DIL JEETA — PYAAR HAI!' },
];

function noClicked(){
  noCount = Math.min(noCount+1, data.length-1);
  var d = data[noCount];

  var qt=document.getElementById('qt'), qsub=document.getElementById('qsub'), em=document.getElementById('emoji');
  qt.style.opacity='0'; qsub.style.opacity='0'; em.style.opacity='0';

  setTimeout(function(){
    em.textContent=d.e; qt.textContent=d.q; qsub.textContent=d.s;
    document.getElementById('yesBtn').textContent=d.yes;
    document.getElementById('noBtn').textContent=d.no;
    qt.style.opacity='1'; qsub.style.opacity='1'; em.style.opacity='1';
  },200);

  document.getElementById('progress').style.width=(noCount/(data.length-1)*100)+'%';

  var btn=document.getElementById('noBtn'), area=document.getElementById('ba');
  var aW=area.offsetWidth, aH=area.offsetHeight;
  var newL=Math.floor(Math.random()*(aW-160));
  var newT=Math.floor(Math.random()*60)+85;
  btn.style.left=newL+'px'; btn.style.top=newT+'px';

  var size=Math.max(8,14-noCount*0.7);
  btn.style.fontSize=size+'px';
  btn.style.padding=Math.max(4,13-noCount)+'px '+Math.max(10,28-noCount*2)+'px';
  btn.style.opacity=Math.max(0.25,1-noCount*0.09);
}

function yesClicked(){
  document.getElementById('qs').style.display='none';
  var ss=document.getElementById('ss'); ss.style.display='flex';
  var flowers=['🌸','🌺','🌹','🌼','🌷','💐','🌻','💖','✨','🎊','💕','🎉','💗','⭐','🌟','🎀','💝'];
  var gw=document.getElementById('gw');
  for(var i=0;i<70;i++){
    (function(i){
      setTimeout(function(){
        var f=document.createElement('div');
        f.className='flower';
        f.textContent=flowers[Math.floor(Math.random()*flowers.length)];
        f.style.left=Math.random()*100+'%';
        f.style.top='-40px';
        f.style.fontSize=(12+Math.random()*24)+'px';
        f.style.animationDuration=(2+Math.random()*2.5)+'s';
        f.style.animationDelay=(Math.random()*0.4)+'s';
        gw.appendChild(f);
        setTimeout(function(){f.remove()},5000);
      },i*50);
    })(i);
  }
}
</script>
</body>
</html>
